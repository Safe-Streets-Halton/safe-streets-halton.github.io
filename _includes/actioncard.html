<div class="action-card">
    <a href="{{include.link}}"><img class="action-card__image" src="{{ include.image }}" alt="{{ include.title }}" /></a>
    <a href="{{include.link}}" class="action-card__title displaySmall">{{ include.title }}</a>
    <div class="action-card__content">{{include.description }}</div>
    <a href="{{include.link}}" class="action-card__button button button--green-transparent">{{include.buttonText}}</a>
</div>
